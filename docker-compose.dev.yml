version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: transcription-postgres-dev
    environment:
      POSTGRES_DB: transcription_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data

  backend:
    image: node:18-alpine
    container_name: transcription-backend-dev
    working_dir: /app
    volumes:
      - ./backend:/app
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/transcription_db
    command: sh -c "npm install && npx prisma generate && npx prisma db push && npm run dev"
    depends_on:
      - postgres

  frontend:
    image: node:18-alpine
    container_name: transcription-frontend-dev
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:3001
    command: sh -c "npm install && npm run dev"
    depends_on:
      - backend

volumes:
  postgres_dev_data: