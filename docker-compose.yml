version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: transcription-db
    environment:
      POSTGRES_USER: transcription
      POSTGRES_PASSWORD: transcription123
      POSTGRES_DB: transcription_system
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - transcription-network

  backend:
    build: ./backend
    container_name: transcription-backend
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://transcription:transcription123@postgres:5432/transcription_system
      PORT: 3001
    depends_on:
      - postgres
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - transcription-network
    command: npm run dev

  frontend:
    build: ./frontend
    container_name: transcription-frontend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:3001
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    networks:
      - transcription-network
    command: npm run dev

volumes:
  postgres_data:

networks:
  transcription-network:
    driver: bridge