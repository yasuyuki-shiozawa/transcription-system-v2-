version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: transcription-postgres
    environment:
      POSTGRES_DB: transcription_db
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - transcription-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.production
    container_name: transcription-backend
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD}@postgres:5432/transcription_db
      - JWT_SECRET=${JWT_SECRET}
      - VPN_OPTIMIZATION=true
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/logs:/app/logs
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - transcription-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.production
      args:
        - NEXT_PUBLIC_VPN_OPTIMIZATION=true
        - NEXT_PUBLIC_API_TIMEOUT=30000
        - NEXT_PUBLIC_API_BASE_URL=${API_BASE_URL:-http://backend:3001}
    container_name: transcription-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - transcription-network
    restart: unless-stopped

  # Nginx リバースプロキシ（HTTPS対応）
  nginx:
    image: nginx:alpine
    container_name: transcription-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - transcription-network
    restart: unless-stopped

networks:
  transcription-network:
    driver: bridge

volumes:
  postgres_data: