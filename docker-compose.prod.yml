version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:3001
    depends_on:
      - backend
    networks:
      - transcription-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=file:./data/prod.db
      - NODE_ENV=production
      - PORT=3001
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    networks:
      - transcription-net

networks:
  transcription-net:
    driver: bridge

volumes:
  data:
  uploads: